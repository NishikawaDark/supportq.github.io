<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Support-Q | Contact Counselors</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="3studentcontact.css"/>

  <style>
    /* ── COUNSELOR LIST ── */
    .counselor-cards-container {
      display: flex; flex-direction: column; gap: 4px;
      padding: 8px 10px 10px; max-height: 500px; overflow-y: auto;
    }

    .counselor-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 10px; border-radius: 12px;
      cursor: pointer; transition: background 0.18s; position: relative;
    }
    .counselor-item:hover { background: #f5f7fa; }
    .counselor-item.selected { background: #132A3F; }

    .counselor-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, #f9a825, #f9d338);
      display: flex; align-items: center; justify-content: center;
      color: #132A3F; font-weight: 800; font-size: 14px; flex-shrink: 0;
    }
    .counselor-info { flex: 1; min-width: 0; }
    .counselor-name {
      font-size: 13.5px; font-weight: 700; color: #132A3F;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .counselor-item.selected .counselor-name { color: #f9d338; }
    .counselor-role { font-size: 11.5px; color: #8a97a8; font-weight: 600; margin-top: 2px; }
    .counselor-item.selected .counselor-role { color: #aab0ba; }

    .counselor-radio {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid #f9d338; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .counselor-radio::after {
      content: ''; width: 8px; height: 8px; border-radius: 50%;
      background: #132A3F; opacity: 0; transition: opacity 0.18s;
    }
    .counselor-item.selected .counselor-radio {
      border-color: transparent; background: #f9d338;
    }
    .counselor-item.selected .counselor-radio::after { opacity: 1; }

    .unread-badge {
      background: #e53935; color: white; border-radius: 50%;
      width: 18px; height: 18px; font-size: 10px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    /* ── CHAT ── */
    .chat-panel-inner { display: flex; flex-direction: column; width: 100%; height: 100%; flex: 1; }

    .chat-panel-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px; border-bottom: 1px solid #f0f2f5; flex-shrink: 0;
    }
    .chat-panel-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, #f9a825, #f9d338);
      display: flex; align-items: center; justify-content: center;
      color: #132A3F; font-weight: 800; font-size: 13px; flex-shrink: 0;
    }
    .chat-panel-name { font-size: 15px; font-weight: 800; color: #132A3F; }
    .chat-panel-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: #1a9e57; margin-top: 2px;
    }
    .chat-panel-status .status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0;
    }

    .chat-panel-body {
      flex: 1; overflow-y: auto;
      padding: 20px; display: flex; flex-direction: column; gap: 10px; min-height: 300px;
    }

    .chat-msg { display: flex; flex-direction: column; max-width: 65%; }
    .chat-msg.student { align-self: flex-end;   align-items: flex-end; }
    .chat-msg.admin   { align-self: flex-start; align-items: flex-start; }

    .chat-bubble-wrap { display: flex; align-items: center; gap: 6px; }
    .chat-msg.student .chat-bubble-wrap { flex-direction: row-reverse; }
    .chat-msg.admin   .chat-bubble-wrap { flex-direction: row; }

    .chat-bubble { padding: 10px 14px; border-radius: 16px; font-size: 13.5px; font-weight: 600; line-height: 1.5; }
    .chat-msg.student .chat-bubble { background: #132A3F; color: white;   border-bottom-right-radius: 4px; }
    .chat-msg.admin   .chat-bubble { background: #f0f2f5; color: #132A3F; border-bottom-left-radius: 4px; }
    .chat-time { font-size: 11px; color: #aab0ba; font-weight: 500; margin-top: 4px; }

    .delete-btn {
      opacity: 0; transition: opacity 0.18s;
      background: none; border: none; cursor: pointer;
      color: #e53935; font-size: 13px; padding: 4px 6px; border-radius: 6px; flex-shrink: 0;
    }
    .delete-btn:hover { background: #fdecea; }
    .chat-msg:hover .delete-btn { opacity: 1; }

    .chat-date-divider {
      text-align: center; font-size: 11px; color: #aab0ba; font-weight: 700;
      margin: 8px 0; display: flex; align-items: center; gap: 8px;
    }
    .chat-date-divider::before, .chat-date-divider::after {
      content: ''; flex: 1; height: 1px; background: #f0f2f5;
    }

    .chat-panel-footer {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-top: 1px solid #f0f2f5; flex-shrink: 0;
    }
    .chat-panel-input {
      flex: 1; border: 1.5px solid #e2e6ea; border-radius: 10px;
      padding: 10px 14px; font-size: 13.5px; font-family: inherit;
      color: #132A3F; outline: none; transition: border-color 0.18s;
    }
    .chat-panel-input:focus { border-color: #f9a825; }
    .chat-panel-send {
      background: #f9a825; color: #132A3F; border: none; border-radius: 10px;
      padding: 10px 18px; font-size: 13.5px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background 0.18s;
    }
    .chat-panel-send:hover { background: #f9d338; }

    .chat-loading {
      text-align: center; color: #aab0ba;
      font-size: 13px; font-weight: 600; padding: 20px;
    }

    [data-theme="dark"] .counselor-item:not(.selected):hover { background: #1e2a35; }
    [data-theme="dark"] .counselor-name { color: #e5e7eb; }
    [data-theme="dark"] .chat-panel-name { color: #e5e7eb; }
    [data-theme="dark"] .chat-msg.admin .chat-bubble { background: #1e2a35; color: #e5e7eb; }
    [data-theme="dark"] .chat-panel-input { background: #1e2a35; color: #e5e7eb; border-color: #374151; }
    [data-theme="dark"] .chat-date-divider::before,
    [data-theme="dark"] .chat-date-divider::after { background: #374151; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-actions">
      <div class="avatar-wrapper" id="avatarBtn" aria-haspopup="true" aria-expanded="false">
        <div class="nav-avatar">
          <span class="nav-avatar-initials" id="navInitials">S</span>
        </div>
        <i class="fa-solid fa-chevron-down avatar-chevron"></i>

        <div class="dropdown-menu" id="dropdownMenu" role="menu">
          <div class="dropdown-header">
            <div class="dropdown-avatar">
              <span class="nav-avatar-initials" id="dropInitials">S</span>
            </div>
            <div>
              <p class="dropdown-name" id="dropName">Student</p>
              <p class="dropdown-role" id="dropSection">Section</p>
            </div>
          </div>
          <hr class="dropdown-divider"/>
          <label class="avatar-upload-label" for="avatarFileInput">
            <i class="fa-solid fa-camera"></i> Set Profile Photo
          </label>
          <input type="file" id="avatarFileInput" accept="image/*"/>
          <button class="dropdown-item" id="profileBtn"><i class="fa-regular fa-user"></i> My Profile</button>
          <button class="dropdown-item" id="settingsBtn"><i class="fa-solid fa-gear"></i> Settings</button>
          <hr class="dropdown-divider"/>
          <div class="dropdown-item theme-row">
            <span><i class="fa-solid fa-circle-half-stroke"></i> Dark Mode</span>
            <label class="toggle-switch" aria-label="Toggle dark mode">
              <input type="checkbox" id="themeToggle"/>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <hr class="dropdown-divider"/>
          <button class="dropdown-item logout" id="dropdownLogout">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- PAGE WRAPPER -->
  <div class="page-wrapper">

    <!-- SIDEBAR -->
    <div class="sidebarwrapper">
      <div class="sidebar">
        <div class="sidebar-brand">
          <i class="fa-solid fa-brain"></i> Support - Q
        </div>
        <hr class="divider">
        <button id="navDashboard"><i class="fa-solid fa-house"></i> Dashboard</button>
        <button class="active" id="navContact"><i class="fa-solid fa-comments"></i> Contact Counselors</button>
        <button id="navAssessments"><i class="fa-solid fa-file-lines"></i> Assessments</button>
        <button id="navResources"><i class="fa-solid fa-hands-holding-circle"></i> Resources</button>
        <button onclick="window.location.href='3studentjournal.html'">
          <i class="fa-solid fa-book-open"></i> Journal
        </button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="two-col">

        <!-- LEFT: Select a Counselor -->
        <div class="card counselor-card">
          <div class="card-header">
            <span class="card-header-icon"><i class="fa-solid fa-address-book"></i></span>
            <h2>Select a Counselor</h2>
          </div>
          <div class="counselor-cards-container" id="counselorList">
            <p class="chat-loading">Loading counselors…</p>
          </div>
        </div>

        <!-- RIGHT: Chat Panel -->
        <div class="card chat-panel-card" id="chatPanelCard">

          <!-- Empty state -->
          <div class="chat-empty-state" id="chatEmptyState">
            <div class="chat-empty-icon"><i class="fa-regular fa-comments"></i></div>
            <p class="chat-empty-title">No conversation yet</p>
            <p class="chat-empty-sub">Select a counselor on the left to start messaging.</p>
          </div>

          <!-- Chat UI -->
          <div class="chat-panel-inner" id="chatPanelInner" style="display:none;">
            <div class="chat-panel-header">
              <div class="chat-panel-avatar" id="chatPanelAvatar"></div>
              <div class="chat-panel-meta">
                <p class="chat-panel-name" id="chatPanelName"></p>
                <p class="chat-panel-status"><span class="status-dot"></span> Available</p>
              </div>
            </div>
            <div class="chat-panel-body" id="chatPanelBody"></div>
            <div class="chat-panel-footer">
              <input class="chat-panel-input" id="chatPanelInput" type="text" placeholder="Type a message…" autocomplete="off"/>
              <button class="chat-panel-send" id="chatPanelSend">
                <i class="fa-solid fa-paper-plane"></i> Send
              </button>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <i class="fa-solid fa-circle-check"></i>
    <span id="toastMsg">Message sent successfully!</span>
  </div>

  <script src="navbar-user.js" defer></script>
  <script type="module" src="3studentcontact.js"></script>
  <script src="npcbuddy.js" defer></script>
</body>
</html>

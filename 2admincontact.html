<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="2admindashboardmain.css">
    <link rel="stylesheet" href="2admindashboardnavbar.css">
    <link rel="stylesheet" href="2admindashboardsidebar.css">

    <script>
      (function(){
        var uid  = sessionStorage.getItem('userId');
        var role = sessionStorage.getItem('userRole');
        if (!uid || role !== 'admin') {
          sessionStorage.clear();
          window.location.replace('index.html');
        }
      })();
    </script>

    <style>
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 20px; padding: 28px 28px 40px; }
        .breadcrumb { font-size: 12px; color: #8a97a8; font-weight: 600; }
        .breadcrumb span { color: #132A3F; }

        .page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
        .page-header-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: linear-gradient(135deg, #f9a825, #f9d338);
            display: flex; align-items: center; justify-content: center;
            color: #132A3F; font-size: 20px;
        }
        .page-header h1 { font-size: 22px; font-weight: 800; color: #132A3F; font-family: 'Quicksand', sans-serif; }
        .page-header p  { font-size: 13px; color: #8a97a8; font-weight: 600; margin-top: 2px; }

        .twobox { display: flex; gap: 16px; align-items: flex-start; flex: 1; }

        /* ── STUDENT CARD LIST ── */
        .listofstudents {
            width: 340px; flex-shrink: 0;
            background: white; border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        .list-header {
            display: flex; align-items: center; gap: 10px;
            padding: 16px 18px 12px;
            border-bottom: 1px solid #f0f2f5;
        }
        .list-header-icon {
            width: 34px; height: 34px; border-radius: 10px;
            background: linear-gradient(135deg, #f9a825, #f9d338);
            display: flex; align-items: center; justify-content: center;
            color: #132A3F; font-size: 15px; flex-shrink: 0;
        }
        .list-header h2 { font-size: 14.5px; font-weight: 800; color: #132A3F; flex: 1; }
        .list-count { font-size: 11.5px; color: #8a97a8; font-weight: 700; }

        .list-toolbar { padding: 10px 14px; border-bottom: 1px solid #f0f2f5; }
        .search-box {
            display: flex; align-items: center; gap: 8px;
            background: #f5f7fa; border-radius: 10px;
            padding: 8px 12px; font-size: 13px;
        }
        .search-box input {
            border: none; background: transparent; outline: none;
            font-size: 13px; color: #132A3F; font-family: inherit; flex: 1;
        }
        .search-box input::placeholder { color: #aab0ba; }
        .search-box i { color: #aab0ba; }

        .student-cards {
            padding: 8px 10px 10px;
            display: flex; flex-direction: column; gap: 2px;
            max-height: 600px; overflow-y: auto;
        }

        .student-card {
            display: flex; align-items: center; gap: 12px;
            padding: 10px; border-radius: 12px;
            cursor: pointer; transition: background 0.18s;
            border-left: 3px solid transparent;
            position: relative;
        }
        .student-card:hover { background: #f5f7fa; }
        .student-card.active { background: #132A3F; border-left-color: #f9d338; }

        /* risk-level left border colours */
        .student-card.risk-urgent    { border-left-color: #ef4444; }
        .student-card.risk-attention { border-left-color: #f9a825; }
        .student-card.risk-stable    { border-left-color: #22c55e; }
        .student-card.active         { border-left-color: #f9d338 !important; }

        .student-card-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: 14px; flex-shrink: 0;
        }
        /* avatar colours by risk */
        .student-card-avatar.urgent    { background: linear-gradient(135deg, #ef4444, #f87171); }
        .student-card-avatar.attention { background: linear-gradient(135deg, #f9a825, #f9d338); color: #132A3F; }
        .student-card-avatar.stable    { background: linear-gradient(135deg, #22c55e, #4ade80); }
        .student-card-avatar.no-data   { background: linear-gradient(135deg, #9ca3af, #d1d5db); }
        .student-card.active .student-card-avatar { border: 2px solid #f9d338; }

        .student-card-info { flex: 1; min-width: 0; }
        .student-card-name {
            font-size: 13.5px; font-weight: 700; color: #132A3F;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .student-card.active .student-card-name { color: #f9d338; }
        .student-card-sub { font-size: 11.5px; color: #8a97a8; font-weight: 600; margin-top: 1px; }
        .student-card.active .student-card-sub { color: rgba(255,255,255,0.55); }

        /* status badge */
        .status-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 800; flex-shrink: 0;
        }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

        .status-urgent    { background: #fef2f2; color: #dc2626; }
        .status-urgent    .status-dot { background: #ef4444; }
        .status-attention { background: #fff4e5; color: #c97a00; }
        .status-attention .status-dot { background: #f9a825; }
        .status-stable    { background: #f0fdf4; color: #16a34a; }
        .status-stable    .status-dot { background: #22c55e; }
        .status-no-data   { background: #f3f4f6; color: #6b7280; }
        .status-no-data   .status-dot { background: #9ca3af; }

        .unread-badge {
            background: #e53935; color: white; border-radius: 50%;
            width: 18px; height: 18px; font-size: 10px; font-weight: 800;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

            min-height: 650px; display: flex; flex-direction: column; overflow: hidden;

            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 40px;
        }

        .chat-empty-title { font-size: 16px; font-weight: 800; color: #6b7280; margin-bottom: 6px; }
        .chat-empty-sub { font-size: 13px; color: #9ca3af; font-weight: 500; max-width: 240px; margin: 0 auto; }

        .chat-panel-inner { display: flex; flex-direction: column; width: 100%; height: 100%; flex: 1; }

        .chat-panel-header {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 20px; border-bottom: 1px solid #f0f2f5; flex-shrink: 0;
        }
        .chat-panel-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: 13px; flex-shrink: 0;
        }
        .chat-panel-avatar.urgent    { background: linear-gradient(135deg, #ef4444, #f87171); }
        .chat-panel-avatar.attention { background: linear-gradient(135deg, #f9a825, #f9d338); color: #132A3F; }
        .chat-panel-avatar.stable    { background: linear-gradient(135deg, #22c55e, #4ade80); }
        .chat-panel-avatar.no-data   { background: linear-gradient(135deg, #9ca3af, #d1d5db); }

        .chat-panel-name { font-size: 15px; font-weight: 800; color: #132A3F; }

        /* risk alert strip in chat header */
        .chat-risk-strip {
            display: flex; align-items: center; gap: 6px;
            font-size: 11.5px; font-weight: 700; margin-top: 3px;
        }
        .chat-risk-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

        /* mini metric chips in chat header */
        .chat-header-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
        .chat-header-chip {
            padding: 2px 8px; border-radius: 20px;
            font-size: 10.5px; font-weight: 800;
        }
        .chip-red    { background: #fef2f2; color: #dc2626; }
        .chip-orange { background: #fff4e5; color: #c97a00; }
        .chip-green  { background: #f0fdf4; color: #16a34a; }
        .chip-gray   { background: #f3f4f6; color: #6b7280; }

        .chat-panel-body {
            flex: 1; overflow-y: auto;
            padding: 20px; display: flex; flex-direction: column; gap: 10px;
            min-height: 300px;
        }

        .chat-msg { display: flex; flex-direction: column; max-width: 65%; }
        .chat-msg.admin   { align-self: flex-end;   align-items: flex-end; }
        .chat-msg.student { align-self: flex-start; align-items: flex-start; }

        .chat-bubble-wrap { display: flex; align-items: center; gap: 6px; }
        .chat-msg.admin   .chat-bubble-wrap { flex-direction: row-reverse; }
        .chat-msg.student .chat-bubble-wrap { flex-direction: row; }

        .chat-bubble { padding: 10px 14px; border-radius: 16px; font-size: 13.5px; font-weight: 600; line-height: 1.5; }
        .chat-msg.admin   .chat-bubble { background: #132A3F; color: white;   border-bottom-right-radius: 4px; }
        .chat-msg.student .chat-bubble { background: #f0f2f5; color: #132A3F; border-bottom-left-radius: 4px; }
        .chat-time { font-size: 11px; color: #aab0ba; font-weight: 500; margin-top: 4px; }

        .delete-btn {
            opacity: 0; transition: opacity 0.18s;
            background: none; border: none; cursor: pointer;
            color: #e53935; font-size: 13px; padding: 4px 6px;
            border-radius: 6px; flex-shrink: 0;
        }
        .delete-btn:hover { background: #fdecea; }
        .chat-msg:hover .delete-btn { opacity: 1; }

        .chat-date-divider {
            text-align: center; font-size: 11px; color: #aab0ba;
            font-weight: 700; margin: 8px 0;
            display: flex; align-items: center; gap: 8px;
        }
        .chat-date-divider::before,
        .chat-date-divider::after { content: ''; flex: 1; height: 1px; background: #f0f2f5; }

        .chat-panel-footer {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 16px; border-top: 1px solid #f0f2f5; flex-shrink: 0;
        }
        .chat-panel-input {
            flex: 1; border: 1.5px solid #e2e6ea; border-radius: 10px;
            padding: 10px 14px; font-size: 13.5px; font-family: inherit;
            color: #132A3F; outline: none; transition: border-color 0.18s;
        }
        .chat-panel-input:focus { border-color: #4db6e8; }
        .chat-panel-send {
            background: #4db6e8; color: white; border: none; border-radius: 10px;
            padding: 10px 18px; font-size: 13.5px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background 0.18s;
        }
        .chat-panel-send:hover { background: #2196c4; }

        .chat-loading {
            text-align: center; color: #aab0ba;
            font-size: 13px; font-weight: 600; padding: 20px;
        }

        /* section divider in student list (Urgent / Attention / Stable) */
        .list-section-label {
            font-size: 10px; font-weight: 800; letter-spacing: 0.1em;
            text-transform: uppercase; color: #aab0ba;
            padding: 8px 6px 2px; margin-top: 4px;
        }
    
/* ── MOBILE RESPONSIVE ── */
@media (max-width: 1024px) {
  .twobox { flex-direction: column; }

  </style>

<script>
    const avatarBtn    = document.getElementById("avatarBtn");
    const dropdownMenu = document.getElementById("dropdownMenu");
    avatarBtn.addEventListener("click", (e) => { e.stopPropagation(); avatarBtn.classList.toggle("open"); dropdownMenu.classList.toggle("show"); });

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const supabase = createClient(
        'https://damkluawdvsthjjcpzgp.supabase.co',
        'sb_publishable_e-m7pdLACqrJAxRiPuy7UA_LXzHuEC6'
    );

    const _rawAdminId = sessionStorage.getItem("userId");
    let adminId = _rawAdminId !== null && _rawAdminId !== "" && !isNaN(Number(_rawAdminId))
        ? Number(_rawAdminId) : null;

    async function ensureAdminId() {
        if (adminId) return true;
        const email = sessionStorage.getItem("userEmail");
        if (!email) return false;
        const { data } = await supabase.from('profiles').select('id').eq('email', email).single();
        if (data) { adminId = data.id; sessionStorage.setItem("userId", String(adminId)); return true; }
        return false;
    }

    // DOM refs
    const chatEmptyState  = document.getElementById("chatEmptyState");
    const chatPanelInner  = document.getElementById("chatPanelInner");
    const chatPanelAvatar = document.getElementById("chatPanelAvatar");
    const chatPanelName   = document.getElementById("chatPanelName");
    const chatRiskStrip   = document.getElementById("chatRiskStrip");
    const chatHeaderChips = document.getElementById("chatHeaderChips");
    const chatPanelBody   = document.getElementById("chatPanelBody");
    const chatPanelInput  = document.getElementById("chatPanelInput");
    const chatPanelSend   = document.getElementById("chatPanelSend");
    const searchInput     = document.getElementById("searchInput");

    let activeStudent = null;
    let realtimeSub   = null;
    // enriched student objects: { ...profile, checkin, level }
    let allStudents   = [];
    let unreadCounts  = {};

    // ── UTILS ──────────────────────────────────────────────────
    function initials(name) {
        return (name || "?").split(" ").map(w => w[0]).join("").substring(0, 2).toUpperCase();
    }
    function formatTime(iso) {
        return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }
    function formatDate(iso) {
        const d = new Date(iso), today = new Date();
        if (d.toDateString() === today.toDateString()) return "Today";
        const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
        if (d.toDateString() === yesterday.toDateString()) return "Yesterday";
        return d.toLocaleDateString([], { month: "short", day: "numeric", year: "numeric" });
    }

    // ── RISK LEVEL — same logic as assessments page ────────────
    function riskLevel(c) {
        if (!c) return 'no-data';
        if (c.mood_rating <= 4 || c.overwhelmed === 'yes' || c.felt_safe === 'no') return 'urgent';
        if (c.mood_rating <= 6 || c.stress_level >= 7) return 'attention';
        return 'stable';
    }

    // Lower = worse (for sorting urgent to top)
    function riskScore(c) {
        if (!c) return 999;
        let s = (c.mood_rating || 5) * 2;
        s -= (c.stress_level || 5);
        if (c.overwhelmed  === 'yes') s -= 5;
        if (c.felt_safe    === 'no')  s -= 5;
        if (c.slept_enough === 'no')  s -= 2;
        return s;
    }

    function levelColor(level) {
        return level === 'urgent' ? '#ef4444'
             : level === 'attention' ? '#f9a825'
             : level === 'stable' ? '#22c55e'
             : '#9ca3af';
    }
    function levelLabel(level) {
        return level === 'urgent'    ? '🚨 Urgent'
             : level === 'attention' ? '⚠️ Attention'
             : level === 'stable'    ? '✅ Stable'
             : 'No check-ins';
    }

    function chipClass(val, invert = false) {
        if (val == null) return 'chip-gray';
        if (invert) return val >= 7 ? 'chip-red' : val >= 5 ? 'chip-orange' : 'chip-green';
        return val >= 7 ? 'chip-green' : val >= 5 ? 'chip-orange' : 'chip-red';
    }

    // ── UNREAD COUNTS ──────────────────────────────────────────
    async function fetchUnreadCounts() {
        if (!adminId) return {};
        const { data } = await supabase
            .from('messages').select('sender')
            .eq('receiver', adminId).eq('seen', 0);
        const counts = {};
        (data || []).forEach(m => { counts[m.sender] = (counts[m.sender] || 0) + 1; });
        return counts;
    }

    function updateUnreadBadge(studentId, count) {
        const card = document.querySelector(`.student-card[data-id="${studentId}"]`);
        if (!card) return;
        let badge = card.querySelector(".unread-badge");
        if (count > 0) {
            if (!badge) { badge = document.createElement("div"); badge.className = "unread-badge"; card.appendChild(badge); }
            badge.textContent = count;
        } else if (badge) { badge.remove(); }
    }

    // ── LOAD ALL DATA ──────────────────────────────────────────
    async function loadStudents() {
        const container = document.getElementById("studentCards");
        await ensureAdminId();

        // Fetch students, their latest checkins, and unread counts in parallel
        const [
            { data: profiles },
            { data: checkins },
            counts,
        ] = await Promise.all([
            supabase.from('profiles').select('*').eq('role', 'student'),
            supabase.from('checkins').select('*').order('submitted_at', { ascending: false }),
            fetchUnreadCounts(),
        ]);

        unreadCounts = counts;

        if (!profiles?.length) {
            container.innerHTML = `<p style="text-align:center;color:#aaa;padding:20px;font-size:13px;">No students found.</p>`;
            return;
        }

        // Build latest-checkin map
        const latestMap = {};
        (checkins || []).forEach(c => {
            if (!latestMap[c.student_id]) latestMap[c.student_id] = c;
        });

        // Enrich each student with their checkin + computed level
        allStudents = profiles.map(s => ({
            ...s,
            checkin: latestMap[s.id] || null,
            level:   riskLevel(latestMap[s.id]),
            score:   riskScore(latestMap[s.id]),
        }));

        // Sort: lowest score (worst) first, then alphabetically within same bucket
        allStudents.sort((a, b) => {
            if (a.score !== b.score) return a.score - b.score;
            return (a.name || '').localeCompare(b.name || '');
        });

        renderStudentList(allStudents);
    }

    // ── RENDER STUDENT LIST ────────────────────────────────────
    function renderStudentList(students) {
        const container = document.getElementById("studentCards");
        const q = searchInput.value.toLowerCase().trim();

        const filtered = q
            ? students.filter(s =>
                (s.name  || "").toLowerCase().includes(q) ||
                (s.grade || "").toLowerCase().includes(q) ||
                (s.email || "").toLowerCase().includes(q) ||
                (s.strand || "").toLowerCase().includes(q)
              )
            : students;

        document.getElementById("listCount").textContent = filtered.length;
        container.innerHTML = "";

        if (!filtered.length) {
            container.innerHTML = `<p style="text-align:center;color:#aaa;padding:20px;font-size:13px;">No students match.</p>`;
            return;
        }

        // Group by level for section headers (only when not searching)
        const groups = q
            ? [{ label: null, items: filtered }]
            : [
                { label: '🚨 Urgent',     items: filtered.filter(s => s.level === 'urgent')    },
                { label: '⚠️ Attention',  items: filtered.filter(s => s.level === 'attention') },
                { label: '✅ Stable',     items: filtered.filter(s => s.level === 'stable')    },
                { label: 'No check-ins',  items: filtered.filter(s => s.level === 'no-data')  },
            ].filter(g => g.items.length > 0);

        groups.forEach(group => {
            if (group.label) {
                const label = document.createElement("div");
                label.className = "list-section-label";
                label.textContent = group.label;
                container.appendChild(label);
            }

            group.items.forEach(student => {
                const ini    = initials(student.name);
                const level  = student.level;
                const color  = levelColor(level);
                const unread = unreadCounts[student.id] || 0;
                const isActive = activeStudent?.id === student.id;

                const card = document.createElement("div");
                card.className  = `student-card risk-${level} ${isActive ? 'active' : ''}`;
                card.dataset.id = student.id;

                // Mini metric chips if checkin exists
                const c = student.checkin;
                const moodChip   = c ? `<span class="status-badge ${level === 'urgent' ? 'status-urgent' : level === 'attention' ? 'status-attention' : 'status-stable'}"><span class="status-dot"></span>${levelLabel(level).replace(/[🚨⚠️✅]/g,'').trim()}</span>` : `<span class="status-badge status-no-data"><span class="status-dot"></span>No data</span>`;

                card.innerHTML = `
                    <div class="student-card-avatar ${level}">${ini}</div>
                    <div class="student-card-info">
                        <div class="student-card-name">${student.name || "Unknown"}</div>
                        <div class="student-card-sub">${[student.grade, student.strand].filter(Boolean).join(' · ') || student.email || '—'}</div>
                    </div>
                    ${moodChip}
                    ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ""}
                `;

                card.addEventListener("click", () => {
                    document.querySelectorAll(".student-card").forEach(c => c.classList.remove("active"));
                    card.classList.add("active");
                    openChatPanel(student);
                });

                container.appendChild(card);
            });
        });
    }

    // ── OPEN CHAT PANEL ───────────────────────────────────────
    function openChatPanel(student) {
        activeStudent = student;
        const level = student.level;
        const color = levelColor(level);
        const c = student.checkin;

        // Avatar
        chatPanelAvatar.textContent = initials(student.name);
        chatPanelAvatar.className   = `chat-panel-avatar ${level}`;
        chatPanelName.textContent   = student.name || "Unknown";

        // Risk strip
        chatRiskStrip.innerHTML = `
            <span class="chat-risk-dot" style="background:${color};"></span>
            <span style="color:${color};">${levelLabel(level)}</span>
            ${c ? `<span style="color:#aab0ba;font-weight:600;font-size:11px;">· Mood ${c.mood_rating ?? '—'}/10 · Stress ${c.stress_level ?? '—'}/10</span>` : ''}
        `;

        // Mini chips for crisis signals
        if (c) {
            const chips = [];
            if (c.overwhelmed === 'yes') chips.push(`<span class="chat-header-chip chip-red">Overwhelmed</span>`);
            if (c.felt_safe   === 'no')  chips.push(`<span class="chat-header-chip chip-red">Felt unsafe</span>`);
            if (c.slept_enough === 'no') chips.push(`<span class="chat-header-chip chip-orange">Poor sleep</span>`);
            if (c.ate_meals   === 'no')  chips.push(`<span class="chat-header-chip chip-orange">Skipped meals</span>`);
            if (c.week_number)           chips.push(`<span class="chat-header-chip chip-gray">Week ${c.week_number} check-in</span>`);
            chatHeaderChips.innerHTML = chips.join('');
        } else {
            chatHeaderChips.innerHTML = `<span class="chat-header-chip chip-gray">No check-ins yet</span>`;
        }

        chatEmptyState.style.display  = "none";
        chatPanelInner.style.display  = "flex";

        loadMessages(student.id);
        subscribeToMessages(student.id);
        setTimeout(() => chatPanelInput.focus(), 150);
    }

    // ── MESSAGES ──────────────────────────────────────────────
    function escapeHtml(text) {
        const d = document.createElement("div");
        d.appendChild(document.createTextNode(text || ""));
        return d.innerHTML;
    }

    async function deleteMessage(msgId, msgEl) {
        if (!confirm("Delete this message?")) return;
        const { error } = await supabase.from('messages').delete().eq('id', msgId);
        if (error) alert("Failed to delete: " + error.message);
        else msgEl.remove();
    }

    function buildMsgEl(msg) {
        const isAdmin = msg.sender === adminId;
        const msgEl = document.createElement("div");
        msgEl.className = `chat-msg ${isAdmin ? 'admin' : 'student'}`;
        msgEl.dataset.msgId = msg.id;
        const deleteBtn = isAdmin ? `<button class="delete-btn" title="Delete"><i class="fa-solid fa-trash"></i></button>` : "";
        msgEl.innerHTML = `
            <div class="chat-bubble-wrap">
                <div class="chat-bubble">${escapeHtml(msg.files)}</div>
                ${deleteBtn}
            </div>
            <span class="chat-time">${formatTime(msg.date)}</span>
        `;
        if (isAdmin) msgEl.querySelector('.delete-btn').addEventListener('click', () => deleteMessage(msg.id, msgEl));
        return msgEl;
    }

    function renderMessages(messages) {
        chatPanelBody.innerHTML = "";
        if (!messages?.length) {
            chatPanelBody.innerHTML = `<p class="chat-loading">No messages yet. Say hello!</p>`;
            return;
        }
        let lastDate = null;
        messages.forEach(msg => {
            const msgDate = formatDate(msg.date);
            if (msgDate !== lastDate) {
                const div = document.createElement("div");
                div.className = "chat-date-divider";
                div.textContent = msgDate;
                chatPanelBody.appendChild(div);
                lastDate = msgDate;
            }
            chatPanelBody.appendChild(buildMsgEl(msg));
        });
        chatPanelBody.scrollTop = chatPanelBody.scrollHeight;
    }

    async function loadMessages(studentId) {
        await ensureAdminId();
        if (!adminId) {
            chatPanelBody.innerHTML = `<p class="chat-loading" style="color:#e53935;">Session error. Please <a href="index.html">log in again</a>.</p>`;
            return;
        }
        chatPanelBody.innerHTML = `<p class="chat-loading">Loading messages…</p>`;
        const { data, error } = await supabase.from('messages').select('*')
            .or(`and(sender.eq.${adminId},receiver.eq.${studentId}),and(sender.eq.${studentId},receiver.eq.${adminId})`)
            .order('date', { ascending: true });
        if (error) { chatPanelBody.innerHTML = `<p class="chat-loading" style="color:#e53935;">Error loading messages.</p>`; return; }
        renderMessages(data);
        await supabase.from('messages').update({ seen: 1 }).eq('sender', studentId).eq('receiver', adminId).eq('seen', 0);
        updateUnreadBadge(studentId, 0);
    }

    function subscribeToMessages(studentId) {
        if (realtimeSub) { supabase.removeChannel(realtimeSub); realtimeSub = null; }
        realtimeSub = supabase.channel(`chat_admin_${adminId}_student_${studentId}`)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                const msg = payload.new;
                const relevant = (msg.sender === adminId && msg.receiver === studentId)
                              || (msg.sender === studentId && msg.receiver === adminId);
                if (!relevant) return;
                const lastDiv = chatPanelBody.querySelector(".chat-date-divider:last-of-type");
                const msgDate = formatDate(msg.date);
                if (!lastDiv || lastDiv.textContent !== msgDate) {
                    const div = document.createElement("div");
                    div.className = "chat-date-divider";
                    div.textContent = msgDate;
                    chatPanelBody.appendChild(div);
                }
                chatPanelBody.appendChild(buildMsgEl(msg));
                chatPanelBody.scrollTop = chatPanelBody.scrollHeight;
                if (msg.sender === studentId) supabase.from('messages').update({ seen: 1 }).eq('id', msg.id);
            })
            .subscribe();
    }

    // ── SEND MESSAGE ───────────────────────────────────────────
    async function sendMessage() {
        const text = chatPanelInput.value.trim();
        if (!text || !activeStudent) return;
        await ensureAdminId();
        if (!adminId) { alert("Session error. Please log in again."); return; }
        chatPanelInput.value = "";
        chatPanelInput.disabled = true;
        chatPanelSend.disabled  = true;
        const { error } = await supabase.from('messages').insert([{
            sender: adminId, receiver: activeStudent.id,
            files: text, date: new Date().toISOString(), seen: 0
        }]);
        chatPanelInput.disabled = false;
        chatPanelSend.disabled  = false;
        chatPanelInput.focus();
        if (error) alert("Failed to send: " + error.message);
    }

    chatPanelSend.addEventListener("click", sendMessage);
    chatPanelInput.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

    // ── SEARCH ────────────────────────────────────────────────
    searchInput.addEventListener("input", () => renderStudentList(allStudents));

    // ── REALTIME UNREAD WATCHER ────────────────────────────────
    supabase.channel('admin_unread_watcher')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            const msg = payload.new;
            if (msg.receiver === adminId && (!activeStudent || msg.sender !== activeStudent.id)) {
                const cur = parseInt(document.querySelector(`.student-card[data-id="${msg.sender}"] .unread-badge`)?.textContent || "0");
                updateUnreadBadge(msg.sender, cur + 1);
            }
        })
        .subscribe();

    // ── INIT ──────────────────────────────────────────────────
    loadStudents().then(() => {
        const targetId = sessionStorage.getItem('openChatStudentId');
        if (targetId) {
            sessionStorage.removeItem('openChatStudentId');
            const targetCard = document.querySelector(`.student-card[data-id="${targetId}"]`);
            if (targetCard) targetCard.click();
        }
    });
</script>

<script src="npcbuddy.js" defer></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var sidebar = document.querySelector('.sidebarwrapper');
  if (!sidebar) return;

  var overlay = document.createElement('div');
  overlay.className = 'sidebar-overlay';
  overlay.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1099;backdrop-filter:blur(2px);';
  document.body.appendChild(overlay);

  var navbar = document.querySelector('.navbar');
  var hamburger = null;
  if (navbar) {
    hamburger = document.createElement('button');
    hamburger.className = 'admin-hamburger';
    hamburger.setAttribute('aria-label', 'Toggle menu');
    hamburger.innerHTML = '<i class="fa-solid fa-bars"></i>';
    hamburger.style.cssText = 'background:none;border:none;cursor:pointer;font-size:1.2rem;color:#132A3F;padding:6px 8px;border-radius:8px;margin-right:auto;display:none;align-items:center;';
    navbar.prepend(hamburger);

    function checkSize() {
      hamburger.style.display = window.innerWidth <= 768 ? 'flex' : 'none';
    }
    checkSize();
    window.addEventListener('resize', checkSize);

    hamburger.addEventListener('click', function(e) {
      e.stopPropagation();
      var isOpen = sidebar.classList.toggle('open');
      overlay.style.display = isOpen ? 'block' : 'none';
    });
  }

  overlay.addEventListener('click', function() {
    sidebar.classList.remove('open');
    overlay.style.display = 'none';
  });

  document.addEventListener('click', function(e) {
    if (sidebar.classList.contains('open') &&
        !sidebar.contains(e.target) &&
        hamburger && !hamburger.contains(e.target)) {
      sidebar.classList.remove('open');
      overlay.style.display = 'none';
    }
  });
});
</script>
